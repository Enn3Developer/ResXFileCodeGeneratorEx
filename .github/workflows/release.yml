name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # Gate the release on the cross-platform generator tests (same project as ci.yml). ci.yml
      # only runs on PRs and pushes to main, not on v* tags, so without this a tag could publish
      # untested. A failure here aborts the job before anything is built, released, or published.
      - name: Run unit tests
        run: >
          dotnet test
          src/dotnet/ReSharperPlugin.ResXFileCodeGeneratorEx.UnitTests/ReSharperPlugin.ResXFileCodeGeneratorEx.UnitTests.csproj
          -c Release

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build plugin
        run: |
          chmod +x ./gradlew
          ./gradlew buildPlugin -PPluginVersion=$VERSION --no-daemon

      - name: Read changelog entry
        id: changelog
        uses: mindsers/changelog-reader-action@v2.4.0
        with:
          path: ./CHANGELOG.md
          version: ${{ env.VERSION }}
          validation_level: warn

      - name: Create GitHub Release
        # Only the Rider plugin .zip is attached. The .nupkg is the ReSharper package, which is
        # unsupported (see docs/resharper-variant-findings.md), so it is not distributed.
        # The release body mirrors this version's CHANGELOG.md section.
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.changes }}
          files: |
            output/*.zip

      # Publishes the Rider plugin .zip to the JetBrains Marketplace. Rider only for now — the
      # ReSharper .nupkg (publishDotNet) is deferred until that variant is functional (see TODO.md).
      # The very first version of a plugin must be uploaded manually via the Marketplace web UI to
      # create the listing; this step covers subsequent versions.
      - name: Publish Rider plugin to JetBrains Marketplace
        env:
          TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin -PPluginVersion=$VERSION -PPublishToken=$TOKEN --no-daemon
